<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>la france chibre.</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      max-width: 90vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      background: black;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const videos = ['video1.mp4', 'video2.mp4', 'video3.mp4'];
      const randomVideo = videos[Math.floor(Math.random() * videos.length)];
      const sourceElement = document.querySelector('video source');
      sourceElement.setAttribute('src', 'cdn/' + randomVideo);
      document.querySelector('video').load();
    });
  </script>
</head>
<body>

  <video controls autoplay>
    <source src="cdn/video.mp4" type="video/mp4">
    Ton navigateur ne supporte pas la vidéo.
  </video>

</body>
</html>
